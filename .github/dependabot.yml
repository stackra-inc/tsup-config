version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    assignees:
      - akouta
    groups:
      stackra:
        patterns:
          - '@stackra/*'
          - '@nesvel/*'
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - '@stackra/*'
          - '@nesvel/*'
      production-dependencies:
        dependency-type: production
        exclude-patterns:
          - '@stackra/*'
          - '@nesvel/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
